version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: datahub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d datahub"]
      interval: 5s
      timeout: 5s
      retries: 5

  dev-env:
    build: .
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/datahub
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
    command: ["tail", "-f", "/dev/null"] # Keep container alive for developers

volumes:
  pgdata:
